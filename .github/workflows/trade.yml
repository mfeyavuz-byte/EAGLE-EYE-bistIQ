name: EAGLE EYE — Otonom Motor Botu

on:
  schedule:
    # Her 20 dakikada bir, 07:00–15:59 UTC = 10:00–18:59 İstanbul, hafta içi.
    # = ~27 tarama/gün (≥20). Pozisyon yönetimi her run; Telegram raporu saat başı.
    - cron: "*/20 7-15 * * 1-5"
  workflow_dispatch: # elle tetik (Actions sekmesi)

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Motorla tara + AI TRADER yönet + Telegram
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT: ${{ secrets.TG_CHAT }}
          GH_GIST_TOKEN: ${{ secrets.GH_GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
        run: node bot/run.mjs
