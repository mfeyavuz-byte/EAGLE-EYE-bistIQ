name: EAGLE EYE — Otonom Motor Botu

on:
  schedule:
    # BIST saatleri (UTC). İstanbul = UTC+3. Hafta içi.
    # 10:00 / 12:00 / 14:00 / 16:00 / 18:00 İstanbul = pozisyon yönetimi + sinyal taraması
    - cron: "0 7 * * 1-5"
    - cron: "0 9 * * 1-5"
    - cron: "0 11 * * 1-5"
    - cron: "0 13 * * 1-5"
    - cron: "0 15 * * 1-5"
  workflow_dispatch: # elle tetik (Actions sekmesi)

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Motorla tara + AI TRADER yönet + Telegram
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT: ${{ secrets.TG_CHAT }}
          GH_GIST_TOKEN: ${{ secrets.GH_GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
        run: node bot/run.mjs
