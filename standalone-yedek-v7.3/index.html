<script>
(function(){
  var BORSA_MCP = "https://borsamcp.fastmcp.app/mcp";
  function _mcpSleep(ms){return new Promise(function(r){setTimeout(r,ms);});}
  async function _mcpOnce(tool, args, timeout){
    var ctrl = new AbortController();
    var tid = setTimeout(function(){ctrl.abort();}, timeout);
    try{
      var res = await fetch(BORSA_MCP, {
        method:"POST", signal:ctrl.signal,
        headers:{"Content-Type":"application/json","Accept":"application/json, text/event-stream"},
        body: JSON.stringify({jsonrpc:"2.0", id:1, method:"tools/call", params:{name:tool, arguments:args}})
      });
      clearTimeout(tid);
      if(!res.ok) return {_retry:true, _reason:"HTTP "+res.status};
      var text = await res.text();
      if(!text || text.length<10) return {_retry:true, _reason:"boş yanıt"};
      var dataLine = text.split("\n").find(function(l){return l.startsWith("data:");});
      if(!dataLine) return {_retry:true, _reason:"SSE data: yok"};
      var obj;
      try{ obj = JSON.parse(dataLine.slice(5)); }
      catch(e){ return {_retry:true, _reason:"JSON parse: "+e.message}; }
      if(obj.error) return {error: obj.error.message || JSON.stringify(obj.error)};
      var inner = obj.result && obj.result.content && obj.result.content[0] && obj.result.content[0].text;
      if(!inner) return {error:"içerik yok", raw: obj};
      try{ return JSON.parse(inner); } catch{ return {raw: inner}; }
    } catch(e){
      clearTimeout(tid);
      return {_retry:true, _reason: e.name==="AbortError" ? "timeout "+timeout+"ms" : (e.message||String(e))};
    }
  }
  async function callMCP(tool, args, timeout){
    timeout = timeout || 12000;
    var delays = [0, 1500, 3000];
    var lastReason = "";
    for(var i=0; i<delays.length; i++){
      if(delays[i]>0) await _mcpSleep(delays[i]);
      var r = await _mcpOnce(tool, args, timeout + i*2000);
      if(!r._retry) return r;
      lastReason = r._reason;
    }
    return {error:"MCP 3 denemede de yanıt vermedi · son sebep: "+lastReason+" · sunucu yoğun, biraz sonra tekrar dene"};
  }
  window.borsaMCP = callMCP;

  var fab = document.getElementById("bmcp-fab");
  var ov  = document.getElementById("bmcp-overlay");
  var modal = document.getElementById("bmcp-modal");
  var closeBtn = document.getElementById("bmcp-close");
  var out = document.getElementById("bmcp-out");
  var symEl = document.getElementById("bmcp-sym");
  var marketEl = document.getElementById("bmcp-market");
  var indexEl = document.getElementById("bmcp-index");
  var presetEl = document.getElementById("bmcp-preset");
  var tfEl = document.getElementById("bmcp-tf");

  function open(){ ov.classList.add("open"); setTimeout(function(){try{run("quick");}catch(e){}},120); }
  function close(){ ov.classList.remove("open"); }
  fab.onclick = open;
  // KART nav sekmesi: capture-phase'de yakala — React setPage hiç çalışmaz, overlay açılır
  document.addEventListener("click", function(e){
    var n = e.target && e.target.closest ? e.target.closest(".nav-item") : null;
    if(n && n.textContent && n.textContent.indexOf("KART") >= 0 && n.textContent.indexOf("📋") >= 0){
      e.stopPropagation(); e.preventDefault(); open();
    }
  }, true);
  closeBtn.onclick = close;
  ov.onclick = function(e){ if(e.target === ov) close(); };
  document.addEventListener("keydown", function(e){ if(e.key === "Escape" && ov.classList.contains("open")) close(); });

  function pretty(d){
    if(d == null) return "null";
    if(typeof d === "string") return d;
    try{ return JSON.stringify(d, null, 2); } catch{ return String(d); }
  }
  var TRL = {
    symbol:"Sembol", name:"\u015Eirket", market:"Piyasa", currency:"Para Birimi",
    current_price:"Fiyat", change_percent:"G\u00FCnl\u00FCk De\u011Fi\u015Fim", volume:"Hacim (lot)",
    market_cap:"Piyasa De\u011Feri", pe_ratio:"F/K Oran\u0131", pb_ratio:"PD/DD Oran\u0131",
    roe:"\u00D6zsermaye K\u00E2rl\u0131l\u0131\u011F\u0131", dividend_yield:"Temett\u00FC Verimi",
    week_52_high:"52 Hafta En Y\u00FCksek", week_52_low:"52 Hafta En D\u00FC\u015F\u00FCk",
    avg_volume:"Ortalama Hacim", beta:"Beta",
    rsi_14:"RSI (14)", rsi:"RSI", macd:"MACD", macd_signal:"MACD Sinyal", macd_histogram:"MACD Histogram",
    sma_5:"SMA 5", sma_10:"SMA 10", sma_20:"SMA 20", sma_50:"SMA 50", sma_200:"SMA 200",
    ema_5:"EMA 5", ema_10:"EMA 10", ema_20:"EMA 20", ema_50:"EMA 50", ema_200:"EMA 200",
    bb_upper:"Bollinger \u00DCst", bb_middle:"Bollinger Orta", bb_lower:"Bollinger Alt",
    timeframe:"Zaman Dilimi", index:"Endeks", preset:"Filtre", condition:"Ko\u015Ful",
    pivot:"Pivot", r1:"Diren\u00E7 1", r2:"Diren\u00E7 2", r3:"Diren\u00E7 3",
    s1:"Destek 1", s2:"Destek 2", s3:"Destek 3",
    date:"Tarih", amount:"Tutar", title:"Ba\u015Fl\u0131k", value:"De\u011Fer",
    high:"En Y\u00FCksek", low:"En D\u00FC\u015F\u00FCk", open:"A\u00E7\u0131l\u0131\u015F", close:"Kapan\u0131\u015F",
    last:"Son Fiyat", bid:"Al\u0131\u015F", ask:"Sat\u0131\u015F",
    signals:"Sinyaller", trend:"Trend", stocks:"Hisseler", results:"Sonu\u00E7lar",
    dividends:"Temett\u00FCler", news:"Haberler", period:"D\u00F6nem", description:"A\u00E7\u0131klama",
    volume_analysis:"Hacim Analizi", moving_averages:"Hareketli Ortalamalar", indicators:"\u0130ndikat\u00F6rler"
  };
  var PRICE_KEYS = ["current_price","week_52_high","week_52_low","open","high","low","close","last","bid","ask","sma_5","sma_10","sma_20","sma_50","sma_200","ema_5","ema_10","ema_20","ema_50","ema_200","bb_upper","bb_middle","bb_lower","pivot","r1","r2","r3","s1","s2","s3","amount","market_cap"];
  var PCT_KEYS = ["change_percent","dividend_yield"];
  function trNum(v, key){
    if(v == null || v === "") return "\u2014";
    if(typeof v === "boolean") return v ? "Evet" : "Hay\u0131r";
    if(typeof v !== "number") return String(v);
    var abs = Math.abs(v), str;
    if(abs >= 1e12) str = (v/1e12).toLocaleString("tr-TR",{maximumFractionDigits:2}) + " Trilyon";
    else if(abs >= 1e9) str = (v/1e9).toLocaleString("tr-TR",{maximumFractionDigits:2}) + " Milyar";
    else if(abs >= 1e6) str = (v/1e6).toLocaleString("tr-TR",{maximumFractionDigits:2}) + " Milyon";
    else str = v.toLocaleString("tr-TR",{maximumFractionDigits:2});
    if(PCT_KEYS.indexOf(key) >= 0) return "%" + str;
    if(PRICE_KEYS.indexOf(key) >= 0) return str + " \u20BA";
    return str;
  }
  function lbl(k){ return TRL[k] || String(k).replace(/_/g," "); }
  function padL(t){ t = t + ":"; while(t.length < 24) t += " "; return t + " "; }
  function fmtLines(obj, indent){
    indent = indent || "";
    var L = [];
    for(var k in obj){
      if(k === "metadata" || k === "data_type") continue;
      var v = obj[k];
      if(v == null){ L.push(indent + padL(lbl(k)) + "\u2014"); continue; }
      if(Array.isArray(v)){
        L.push("");
        L.push(indent + "\u25A0 " + lbl(k).toUpperCase() + " (" + v.length + " adet)");
        v.slice(0, 25).forEach(function(item, i){
          if(item && typeof item === "object"){
            var tag = item.symbol || item.title || item.date || ("#" + (i+1));
            L.push(indent + "  \u2500\u2500 " + tag);
            L = L.concat(fmtLines(item, indent + "    "));
          } else {
            L.push(indent + "  \u2022 " + item);
          }
        });
        if(v.length > 25) L.push(indent + "  ... ve " + (v.length-25) + " adet daha");
        continue;
      }
      if(typeof v === "object"){
        L.push("");
        L.push(indent + "\u25A0 " + lbl(k).toUpperCase());
        L = L.concat(fmtLines(v, indent + "  "));
        continue;
      }
      L.push(indent + padL(lbl(k)) + trNum(v, k));
    }
    return L;
  }
  function humanize(act, res){
    var heads = {quick:"\u26A1 H\u0130SSE \u00D6ZET\u0130", scan:"\u{1F50D} TARAMA SONUCU", pivot:"\u{1F4D0} DESTEK / D\u0130REN\u00C7", tech:"\u{1F4C8} TEKN\u0130K ANAL\u0130Z", div:"\u{1F4B0} TEMETT\u00DC GE\u00C7M\u0130\u015E\u0130", news:"\u{1F4F0} KAP HABERLER\u0130", corp:"\u{1F3E2} \u015E\u0130RKET \u0130\u015ELEMLER\u0130", macro:"\u{1F4CA} MAKRO VER\u0130 (T\u00DCFE)", search:"\u{1F50E} ARAMA SONUCU"};
    var head = heads[act] || "SONU\u00C7";
    var core = res;
    if(res && res.data && typeof res.data === "object") core = res.data;
    var body = (core && typeof core === "object") ? fmtLines(core).join("\n") : String(core);
    var meta = res && res.metadata;
    var src = "";
    if(meta){
      var t = String(meta.timestamp || "");
      src = "\n\n\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nKaynak: " + (meta.source || "?") + (t ? " \u00B7 " + t.slice(0,10) + " " + t.slice(11,16) : "") + "\n\u26A0 Veri ~15 dk gecikmeli olabilir";
    }
    return head + "\n" + Array(31).join("\u2500") + "\n" + body + src;
  }
  async function run(act){
    var sym = (symEl.value || "").trim().toUpperCase() || "THYAO";
    if(act==="firsat"){
      out.classList.remove("err"); out.classList.add("loading");
      out.textContent="🔥 Bugünün fırsatları taranıyor (oto)...";
      var dip=await callMCP("scan_stocks",{index:indexEl.value,preset:"oversold",timeframe:"1d"},15000);
      var mom=await callMCP("scan_stocks",{index:indexEl.value,preset:"bullish_momentum",timeframe:"1d"},15000);
      out.classList.remove("loading");
      function names(r){var c=(r&&r.stocks)||(r&&r.data&&r.data.stocks)||[];return c.slice(0,8).map(function(x){return x.symbol||x.name;}).join(", ")||"—";}
      out.textContent="🔥 BUGÜNÜN FIRSATLARI ("+indexEl.value+")\n"+Array(31).join("─")+"\n\n📉 DİP ADAYLARI (aşırı satım)\n"+names(dip)+"\n\n📈 MOMENTUM (yükseliş)\n"+names(mom)+"\n\n⚠ Yatırım tavsiyesi değildir · ~15dk gecikmeli";
      return;
    }
    if(act==="portfoy"){
      out.classList.remove("err","loading");
      var J=[];try{J=JSON.parse(localStorage.getItem("feybot_journal")||"[]");}catch(e){}
      if(!J.length){out.textContent="💼 PORTFÖY GEÇMİŞİ\n"+Array(31).join("─")+"\n\nHenüz kapanmış pozisyon yok.\nPozisyon kapattıkça K/Z eğrisi burada birikir.";return;}
      var cum=0, pts=[], rows=[];
      J.forEach(function(j){var p=+(j.pnl||0);cum+=p;pts.push(cum);rows.push((j.sym||"?")+": "+(p>=0?"+":"")+p.toLocaleString("tr-TR")+" ₺ → küm "+(cum>=0?"+":"")+Math.round(cum).toLocaleString("tr-TR"));});
      var mn=Math.min.apply(null,pts),mx=Math.max.apply(null,pts),rng=(mx-mn)||1,W=40;
      var spark=pts.map(function(v){var h=Math.round((v-mn)/rng*7);return "▁▂▃▄▅▆▇█".charAt(h);}).join("");
      var wins=J.filter(function(j){return (j.pnl||0)>0;}).length;
      out.textContent="💼 PORTFÖY K/Z EĞRİSİ\n"+Array(31).join("─")+"\n\nToplam kapanan: "+J.length+" · Kazançlı: "+wins+" (%"+Math.round(wins/J.length*100)+")\nKümülatif K/Z: "+(cum>=0?"+":"")+Math.round(cum).toLocaleString("tr-TR")+" ₺\n\n"+spark+"\n\n"+rows.slice(-12).join("\n");
      return;
    }
    var market = marketEl.value;
    var tool, args;
    switch(act){
      case "quick":  tool="get_quick_info"; args={symbol:sym, market:market}; break;
      case "scan":   tool="scan_stocks"; args={index:indexEl.value, preset:presetEl.value, timeframe:tfEl.value}; break;
      case "pivot":  tool="get_pivot_points"; args={symbol:sym, market:market}; break;
      case "tech":   tool="get_technical_analysis"; args={symbol:sym, market:market, timeframe:tfEl.value}; break;
      case "div":    tool="get_dividends"; args={symbol:sym, market:market}; break;
      case "news":   tool="get_news"; args={symbol:sym}; break;
      case "corp":   tool="get_corporate_actions"; args={symbol:sym}; break;
      case "macro":  tool="get_macro_data"; args={data_type:"inflation", inflation_type:"tufe", limit:6}; break;
      case "search": tool="search_symbol"; args={query:sym.toLowerCase(), market:market}; break;
      default: return;
    }
    out.classList.remove("err");
    out.classList.add("loading");
    out.textContent = "🛰  " + tool + "(" + JSON.stringify(args) + ") çağrılıyor (gerekirse 3 deneme + 4.5sn beklenir)...";
    var res = await callMCP(tool, args, 15000);
    out.classList.remove("loading");
    if(res && res.error){
      out.classList.add("err");
      out.textContent = "⚠ HATA: " + (res.error.message || res.error);
    } else {
      out.textContent = humanize(act, res);
    }
  }
  Array.prototype.forEach.call(document.querySelectorAll(".bmcp-tools button"), function(b){
    b.onclick = function(){ run(b.dataset.act); };
  });

  // E: KAP haber bildirimi — favorilere yeni duyuru düşünce
  async function kapCheck(){
    if(!("Notification" in window)||Notification.permission!=="granted")return;
    var favs=[];try{favs=JSON.parse(localStorage.getItem("feybot_favs")||"[]");}catch(e){}
    if(!favs.length)return;
    var seen={};try{seen=JSON.parse(localStorage.getItem("feybot_kapseen")||"{}");}catch(e){}
    for(var i=0;i<Math.min(favs.length,8);i++){
      var sym=favs[i];
      try{
        var r=await callMCP("get_news",{symbol:sym},10000);
        var news=(r&&r.data&&r.data.news)||(r&&r.news)||[];
        if(news.length&&news[0].id&&seen[sym]!==news[0].id){
          if(seen[sym]) new Notification("📰 "+sym+" — KAP",{body:(news[0].title||"Yeni duyuru").slice(0,120),icon:"icon-192.png",tag:"kap-"+sym});
          seen[sym]=news[0].id;
        }
      }catch(e){}
      await _mcpSleep(800);
    }
    localStorage.setItem("feybot_kapseen",JSON.stringify(seen));
  }
